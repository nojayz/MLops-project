steps:
- name: 'gcr.io/cloud-builders/docker'
  id: 'Build container image'
  args: [
    'build',
    '.',
    '-t',
    'europe-west1-docker.pkg.dev/$PROJECT_ID/dtumlops-repo/sklearn-pipeline:latest',
    '-f',
    'main.dockerfile'
  ]
- name: 'gcr.io/cloud-builders/docker'
  id: 'Push container image'
  args: [
    'push',
    'europe-west1-docker.pkg.dev/$PROJECT_ID/dtumlops-repo/sklearn-pipeline:latest'
  ]
options:
  logging: CLOUD_LOGGING_ONLY
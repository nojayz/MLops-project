name: data checks

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
  pull_request:
    branches: [main]
    paths:
      - 'data/**'

jobs:
  format:
    name: run the pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --locked --dev
          uv tree

      - name: install and running pre-commit
        run: uv run src/dtu_mlops/dataset.py
